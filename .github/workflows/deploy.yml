name: Flexocon react application to github pages

on:

   push:

        branches:
        - main
permissions:
    contents: write

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '22'
            - name: Install Dependencies
              run: npm install
            - name: Build Project
              run: npm run build

            - name: Build
              run: npm run build
              env:
                VITE_REACT_APP_GITHUB_PAGES_URL: ${{ secrets.VITE_REACT_APP_GITHUB_PAGES_URL }}

            #deploy
            - name: Deploy to github pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: ./dist